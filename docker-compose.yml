version: "3.9"
services:
  api:
    build: .
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      TELECOM_SOC_LOG_PATH: /app/data/logs/telecom.log
      TELECOM_SOC_STATE_PATH: /app/data/state
      TELECOM_SOC_AUTO_BLOCK: "false"
    volumes:
      - ./:/app

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      TELECOM_SOC_API_BASE: http://api:8000
    volumes:
      - ./:/app
    depends_on:
      - api
